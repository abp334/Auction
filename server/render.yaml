services:
  - type: web
    name: bidarena-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: cd server && npm ci && npx prisma generate && npm run build
    startCommand: cd server && npx prisma migrate deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bidarena-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bidarena-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false

databases:
  - name: bidarena-db
    plan: starter
    databaseName: bidarena
    user: bidarena

services:
  - type: redis
    name: bidarena-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
