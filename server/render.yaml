services:
  - type: web
    name: bidarena-api
    runtime: node
    region: oregon
    plan: starter
    rootDir: server
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bidarena-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bidarena-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
  - type: redis
    name: bidarena-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  - name: bidarena-db
    plan: starter
    databaseName: bidarena
    user: bidarena
